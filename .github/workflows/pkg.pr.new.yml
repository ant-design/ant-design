name: Publish Any Commit
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - run: corepack enable
      - uses: utooland/setup-utoo@e63ce40ce5f7e9838c666a57479344e91c3a9795 # v1

      - name: Install dependencies
        run: ut

      - name: Build
        run: ut build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      # ========== Prepare examples ==========
      - name: Clear examples
        run: rm -rf examples

      - name: Clone examples
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ant-design/ant-design-examples
          path: examples

      - name: Modify examples
        run: utx tsx scripts/prepare-examples.ts

      - run: utx pkg-pr-new publish --template './examples/examples/*'
