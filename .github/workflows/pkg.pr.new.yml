name: Publish Any Commit
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - run: corepack enable
      - uses: utooland/setup-utoo@e63ce40ce5f7e9838c666a57479344e91c3a9795 # v1

      - name: Install dependencies
        run: ut

      - name: Build
        run: ut build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      # ========== Prepare examples ==========
      - name: Clear examples
        run: rm -rf examples

      - name: Clone examples
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ant-design/ant-design-examples
          path: examples

      - name: Modify examples
        run: utx tsx scripts/prepare-examples.ts

      - run: utx pkg-pr-new publish --template './examples/examples/*'
