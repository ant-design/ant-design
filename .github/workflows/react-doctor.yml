name: 🏥 React Doctor

on: push

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: millionco/react-doctor@main
        with:
          fail-on: error
          diff: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
